# ─────────────────────────────────────────────────────────────────────────────
# Contract Guardian AI – Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          # Build images and start all services
#   docker compose up -d               # Start in detached (background) mode
#   docker compose logs -f backend     # Stream backend logs
#   docker compose down -v             # Stop and remove containers + volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contractguardian-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── App ──────────────────────────────────────────────────────────────
      PORT: "8000"
      DEBUG: "false"

      # ── Database ──────────────────────────────────────────────────────────
      # Uncomment the PostgreSQL URL below and remove the SQLite line to use
      # the bundled Postgres service.
      #
      # DATABASE_URL: "postgresql://pguser:pgpassword@db:5432/contractguardian_db"
      DATABASE_URL: "${DATABASE_URL:-sqlite:///./contract_guardian.db}"

      # ── Gemini AI ─────────────────────────────────────────────────────────
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"

      # ── AWS S3 (optional) ─────────────────────────────────────────────────
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET:-}"
    volumes:
      # Persist locally uploaded files across container restarts
      - backend_local_storage:/app/local_storage
      # Persist SQLite database (ignored when using PostgreSQL)
      - backend_sqlite:/app
    networks:
      - app-network
    # Uncomment if you switch to the PostgreSQL service below
    # depends_on:
    #   db:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contractguardian-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
      # Point the Next.js app at the backend API.
      # From the browser's perspective the backend is exposed on port 8000.
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
      # For server-side fetches inside the Docker network use the service name:
      # NEXT_PUBLIC_API_URL: "http://backend:8000"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── PostgreSQL (optional – uncomment to use instead of SQLite) ─────────────
  # db:
  #   image: postgres:16-alpine
  #   container_name: contractguardian-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: pguser
  #     POSTGRES_PASSWORD: pgpassword
  #     POSTGRES_DB: contractguardian_db
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U pguser -d contractguardian_db"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

# ─────────────────────────────────────────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  backend_local_storage:
    driver: local
  backend_sqlite:
    driver: local
  # postgres_data:
  #   driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
